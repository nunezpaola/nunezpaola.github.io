<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <div class="site-shell">
      <aside class="profile-sidebar">
        <div class="profile-card">
          <p class="profile-name">Paola Nunez</p>
          <p class="profile-copy">Estudié Economía en la Universidad Torcuato Di Tella y algo más de 3 años trabajo en finanzas. Me divierten la programación y los sistemas autónomos.</p>
          <div class="profile-links">
            <a href="https://www.linkedin.com/in/paolanunezh/">LinkedIn</a>
            <a href="https://github.com/nunezpaola">GitHub</a>
          </div>
        </div>
      </aside>

      <div class="page-main">
        <header class="site-header">
          <a class="brand" href="{{ '/' | relative_url }}"><img class="brand-logo" src="{{ '/assets/img/raven.svg' | relative_url }}" alt=""><span>{{ site.title }}</span></a>
          <nav class="site-nav">
            <a href="{{ '/' | relative_url }}">Inicio</a>
            <a href="{{ '/#posts' | relative_url }}">Posts</a>
            <a href="{{ '/about/' | relative_url }}">About</a>
          </nav>
        </header>
        <main class="container">{{ content }}</main>
        <footer class="site-footer"><p>Research notes. Built with Jekyll.</p></footer>
      </div>
    </div>
  </body>
</html>
