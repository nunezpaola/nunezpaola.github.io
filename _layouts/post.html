---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%d %b %Y" }}{% if page.tags %} · {{ page.tags | join: ', ' }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
  </header>

  <section class="post-content">
    {{ content }}
  </section>

  <a class="back-link" href="{{ '/' | relative_url }}">← Volver al inicio</a>
</article>
